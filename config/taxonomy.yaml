rules:
  single_primary_category: true
  min_tags_per_article: 3
  max_tags_per_article: 7
  max_partner_tags_per_article: 3
  max_location_tags_per_article: 2
  require_category: true
  require_summary: true
  require_slug: true
  require_title: true
  require_language: true
  default_language: "en"
  allowed_statuses:
    - "draft"
    - "approved"
    - "archived"
  default_status: "approved"
  default_visibility: "public"
  allowed_visibilities:
    - "public"
    - "internal"
    - "restricted"
  enforce_controlled_vocabulary: true
  normalize_case: true
  trim_whitespace: true
  deduplicate_tags: true

