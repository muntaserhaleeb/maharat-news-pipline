chunking:
  strategy: markdown_structure

  target_words: 250
  max_words: 450
  overlap_words: 50

  preserve_headings: true
  preserve_paragraphs: true

  chunk_types:
    - overview
    - section
    - faq
    - definition

  importance_weights:
    overview: 1.0
    section: 0.8
    faq: 0.9
    definition: 0.9
